name: testdata-smoke

on:
  push:
    branches: [main, feat/test-data-foundry-v1]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 8

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build CLI + testdata
        run: pnpm --filter @requiem/testdata typecheck && pnpm --filter @requiem/cli build

      - name: Generate run A
        run: |
          pnpm rl dataset gen POL-TENANT-ISOLATION --seed 1337 --out artifacts_a
          pnpm rl dataset gen POL-ROLE-ESCALATION --seed 1337 --out artifacts_a
          pnpm rl dataset gen TOOL-SCHEMA-STRESS --seed 1337 --out artifacts_a

      - name: Generate run B
        run: |
          pnpm rl dataset gen POL-TENANT-ISOLATION --seed 1337 --out artifacts_b
          pnpm rl dataset gen POL-ROLE-ESCALATION --seed 1337 --out artifacts_b
          pnpm rl dataset gen TOOL-SCHEMA-STRESS --seed 1337 --out artifacts_b

      - name: Determinism byte parity
        run: |
          for code in POL-TENANT-ISOLATION POL-ROLE-ESCALATION TOOL-SCHEMA-STRESS; do
            run_a=$(grep -R -l "\"dataset_code\": \"$code\"" artifacts_a/run_*/dataset.json | head -n1 | xargs dirname)
            run_b=$(grep -R -l "\"dataset_code\": \"$code\"" artifacts_b/run_*/dataset.json | head -n1 | xargs dirname)
            cmp "$run_a/items.jsonl" "$run_b/items.jsonl"
            cmp "$run_a/labels.jsonl" "$run_b/labels.jsonl"
            cmp "$run_a/manifest.json" "$run_b/manifest.json"
          done

      - name: Validate smoke
        run: |
          pnpm rl dataset validate POL-TENANT-ISOLATION --seed 1337
          pnpm rl dataset validate POL-ROLE-ESCALATION --seed 1337
          pnpm rl dataset validate TOOL-SCHEMA-STRESS --seed 1337
