name: intelligence-nightly

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

jobs:
  intelligence-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 8
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: install
        run: pnpm install --frozen-lockfile
      - name: verify intelligence
        run: pnpm verify:intelligence
      - name: extract cases from successful fix runs
        run: pnpm intelligence:extract-cases
      - name: verify metamorphic
        run: pnpm verify:metamorphic
      - name: verify calibration window format
        run: pnpm verify:calibration-window
      - name: drift suite (CRITICAL gate)
        run: pnpm verify:drift-suite
      - name: upload intelligence reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: intelligence-reports
          path: artifacts/reports/intelligence_drift_report.json
          if-no-files-found: warn
